name: CI/CD & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '25'
          cache: 'gradle'

      - name: Build and Run Tests
        run: ./gradlew clean build

      - name: Bump Version and Tag
        if: github.event_name == 'push'
        id: tag_repo
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: minor
          create_annotated_tag: true

      - name: Create GitHub Release
        if: github.event_name == 'push' && steps.tag_repo.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_repo.outputs.new_tag }}
          name: v${{ steps.tag_repo.outputs.new_version }}
          files: build/libs/github-tag-java-1.0.0.jar
          generate_release_notes: true

      - name: Update Major Version Tag
        if: github.event_name == 'push' && steps.tag_repo.outputs.new_tag != ''
        run: |
          MAJOR_VERSION=$(echo "${{ steps.tag_repo.outputs.new_version }}" | cut -d'.' -f1)
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git tag -fa "v${MAJOR_VERSION}" -m "Update v${MAJOR_VERSION} tag to latest release"
          git push origin "v${MAJOR_VERSION}" --force