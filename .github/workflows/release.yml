name: CI/CD & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'oracle'
          java-version: '25'
          cache: 'gradle'

      - name: Build and Run Tests
        run: ./gradlew clean build

      - name: Bump Version and Tag
        if: github.event_name == 'push'
        id: tag_repo
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: minor
          create_annotated_tag: true

      - name: Rename JAR for Release
        if: github.event_name == 'push' && steps.tag_repo.outputs.new_tag != ''
        run: mv build/libs/github-tag-java.jar build/libs/github-tag-java-${{ steps.tag_repo.outputs.new_version }}.jar

      - name: Create GitHub Release
        if: github.event_name == 'push' && steps.tag_repo.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_repo.outputs.new_tag }}
          name: v${{ steps.tag_repo.outputs.new_version }}
          files: build/libs/github-tag-java-${{ steps.tag_repo.outputs.new_version }}.jar
          generate_release_notes: true